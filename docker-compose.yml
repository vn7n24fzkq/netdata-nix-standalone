services:
  netdata:
    image: ghcr.io/vn7n24fzkq/netdata-standalone:2.9.0
    container_name: netdata
    hostname: ${NETDATA_HOSTNAME:-netdata}
    pid: host
    network_mode: host
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      # Netdata config and data
      - netdata-config:/etc/netdata
      - netdata-lib:/var/lib/netdata
      - netdata-cache:/var/cache/netdata
      - netdata-log:/var/log/netdata
      # Host filesystem for monitoring (mounted under /host)
      - /:/host/root:ro,rslave
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/log:/host/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Docker container logs (for log source identification)
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      # Systemd journal (for NixOS)
      - /run/log/journal:/run/log/journal:ro
      - /var/log/journal:/var/log/journal:ro

    environment:
      # Bind to localhost only (default). Set to 0.0.0.0 to allow remote access
      - NETDATA_BIND_IP=127.0.0.1

volumes:
  netdata-config:
  netdata-lib:
  netdata-cache:
  netdata-log:
