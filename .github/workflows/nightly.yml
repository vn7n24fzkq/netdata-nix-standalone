name: Nightly Build

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/netdata-standalone

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build netdata (with auto hash update)
        id: build
        run: |
          set +e
          OUTPUT=$(nix build .#netdata 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -q "hash mismatch"; then
            echo "hash_mismatch=true" >> $GITHUB_OUTPUT
            NEW_HASH=$(echo "$OUTPUT" | grep "got:" | awk '{print $2}')
            echo "new_hash=$NEW_HASH" >> $GITHUB_OUTPUT
            echo "Detected new dashboard hash: $NEW_HASH"
          else
            echo "hash_mismatch=false" >> $GITHUB_OUTPUT
          fi

          exit $EXIT_CODE

      - name: Update dashboard hash
        if: failure() && steps.build.outputs.hash_mismatch == 'true'
        run: |
          NEW_HASH="${{ steps.build.outputs.new_hash }}"
          echo "Updating flake.nix with new hash: $NEW_HASH"

          # Update the hash in flake.nix
          sed -i "s|hash = \"sha256-[^\"]*\"|hash = \"$NEW_HASH\"|" flake.nix

          # Verify the change
          grep "hash = " flake.nix

      - name: Rebuild with new hash
        if: failure() && steps.build.outputs.hash_mismatch == 'true'
        run: nix build .#netdata

      - name: Commit updated hash
        if: failure() && steps.build.outputs.hash_mismatch == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "Update dashboard hash to ${{ steps.build.outputs.new_hash }}"
          git push

      - name: Check flake
        run: nix flake check

      - name: Build Docker image
        run: nix build .#docker

      - name: Get netdata version
        id: version
        run: |
          VERSION=$(nix eval --raw .#netdata.version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if version tag exists
        id: check_tag
        run: |
          IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Check if the version tag already exists in registry
          if docker manifest inspect "${IMAGE_NAME}:${VERSION}" > /dev/null 2>&1; then
            echo "Version ${VERSION} already exists in registry"
            echo "tag_exists=true" >> $GITHUB_OUTPUT
          else
            echo "Version ${VERSION} is new"
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Load and push Docker image
        run: |
          docker load < result

          IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Only push version tag if it's a new version
          if [ "${{ steps.check_tag.outputs.tag_exists }}" == "false" ]; then
            echo "Pushing new version tag: ${VERSION}"
            docker push "${IMAGE_NAME}:${VERSION}"
          else
            echo "Skipping version tag push (already exists)"
          fi

          # Always update latest
          docker tag "${IMAGE_NAME}:${VERSION}" "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:latest"

      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Netdata version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_tag.outputs.tag_exists }}" == "false" ]; then
            echo "- New version tag pushed: \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Version tag already exists, only updated \`latest\`" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.build.outputs.hash_mismatch }}" == "true" ]; then
            echo "- Dashboard hash was auto-updated" >> $GITHUB_STEP_SUMMARY
          fi
